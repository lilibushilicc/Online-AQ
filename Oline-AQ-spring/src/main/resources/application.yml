server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/exam_system}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:123456}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  jwt-secret: ${JWT_SECRET:oline-aq-demo-secret-key-change-me-please-32bytes}
  jwt-expire-hours: ${JWT_EXPIRE_HOURS:24}
  upload-dir: ${UPLOAD_DIR:uploads/exam-files}
